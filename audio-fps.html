<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <title>Audio FPS Prototype</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(circle at 20% 20%, #0f2133, #05080d 55%, #020306 100%);
      color: #8be8ff;
      font-family: "Consolas", "Liberation Mono", monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      overflow: hidden;
    }
    h1 {
      letter-spacing: 0.16em;
      font-size: clamp(1.1rem, 2.4vw, 1.8rem);
      text-shadow: 0 0 18px rgba(66, 201, 255, 0.42);
      text-transform: uppercase;
    }
    .help {
      color: #c6fbdd;
      opacity: 0.9;
      font-size: 0.9rem;
      text-align: center;
      max-width: 740px;
      line-height: 1.45;
      padding: 0 12px;
    }
    #audioFpsRoot {
      width: min(1080px, 96vw);
      aspect-ratio: 3 / 2;
      border: 1px solid rgba(100, 214, 255, 0.45);
      box-shadow: 0 0 28px rgba(0, 156, 255, 0.22), inset 0 0 40px rgba(0, 0, 0, 0.5);
      border-radius: 6px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1>Audio-First FPS Engine</h1>
  <p class="help">
    Controls: WASD move, Q/E turn, SPACE fire, C compass cue, P manual navigation ping, click once to unlock audio.
  </p>
  <div id="audioFpsRoot"></div>

  <script type="importmap">
    {
      "imports": {
        "tone": "https://esm.sh/tone@15",
        "phaser": "https://esm.sh/phaser@3.90.0"
      }
    }
  </script>
  <script type="module" src="./packages/client/dist/audio-fps/main.js"></script>
</body>
</html>
