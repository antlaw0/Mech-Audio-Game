<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <title>Mech Audio Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #0af;
    }
    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      text-shadow: 0 0 12px #0af;
      margin-bottom: 48px;
    }
    .launch-btn {
      background: transparent;
      border: 2px solid #0af;
      color: #0af;
      font-family: monospace;
      font-size: 1rem;
      letter-spacing: 2px;
      padding: 14px 36px;
      cursor: pointer;
      text-shadow: 0 0 6px #0af;
      box-shadow: 0 0 10px #0af44, inset 0 0 10px transparent;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .launch-btn:hover,
    .launch-btn:focus {
      background: #0af2;
      box-shadow: 0 0 20px #0af8, inset 0 0 12px #0af2;
      outline: none;
    }
    .launch-btn:active {
      background: #0af4;
    }
  </style>
</head>
<body>
  <h1>MECH AUDIO GAME</h1>
  <a href="./audio-fps.html" style="margin-bottom: 14px;">
    <button class="launch-btn" type="button">LAUNCH AUDIO FPS PROTOTYPE</button>
  </a>
  <a href="./test-map.html">
    <button class="launch-btn" type="button">LAUNCH TEST MAP</button>
  </a>
</body>
</html>
